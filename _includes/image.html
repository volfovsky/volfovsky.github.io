<dl id="" class="wp-caption align{{include.align}}" style="max-width: {{include.width}}px">

<dt>{% if include.href %}<a href="{{ include.href }}">{% endif %}<img class="" src="{{ include.url }}" alt="{% if include.alt %}{{ include.alt }}{% else %}{{ include.caption }}{% endif %}" />{% if include.href %}</a>{% endif %}</dt>

{% if include.caption %}<dd>{{ include.caption }}</dd>{% endif %}
</dl>
